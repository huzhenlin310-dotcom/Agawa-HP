<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Contact page for a trilingual personal magazine website.">
    <title>Contact · 阿川</title>
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/main.js" defer></script>
  </head>
  <body data-page="contact">
    <div class="reading-progress" aria-hidden="true"><span></span></div>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Home">
        <span class="brand-mark">+1</span>
        <span class="brand-text">Lab</span>
      </a>
      <nav class="primary-nav" aria-label="Primary navigation">
        <a href="index.html" data-nav="home">HOME</a>
        <a href="about.html" data-nav="about">ABOUT</a>
        <a href="works.html" data-nav="works">WORKS</a>
        <a href="blog.html" data-nav="blog">BLOG</a>
        <a href="contact.html" data-nav="contact" aria-current="page">CONTACT</a>
      </nav>
      <div class="language-switch" aria-label="Language">
        <button type="button" data-lang="zh" aria-pressed="true">中</button>
        <button type="button" data-lang="en" aria-pressed="false">EN</button>
        <button type="button" data-lang="ja" aria-pressed="false">日</button>
      </div>
    </header>

    <main id="content" class="page-shell contact-page">
      <section class="contact-grid reveal">
        <p class="issue-label" data-ui="backPage">Back page</p>
        <h1 class="page-title" data-contact-title>联系我</h1>
        <p class="page-lead" data-contact-intro></p>
        <figure class="contact-figure">
          <img src="assets/images/contact-desk.jpg" alt="" width="1600" height="1100" loading="lazy">
          <figcaption data-ui="deskCaption">Letters, notes, and open channels.</figcaption>
        </figure>
        <div class="contact-directory" aria-label="Contact directory">
          <div>
            <p class="section-kicker" data-ui="emailLabel">Email</p>
            <a class="large-link" data-contact-email href="mailto:hello@example.com">hello@example.com</a>
          </div>
          <div>
            <p class="section-kicker" data-ui="locationLabel">Location</p>
            <p data-contact-location></p>
          </div>
          <div>
            <p class="section-kicker" data-ui="socialLabel">Social</p>
            <ul class="link-list" data-contact-socials></ul>
          </div>
          <div>
            <p class="section-kicker" data-ui="collaborationLabel">Collaboration</p>
            <ul class="plain-list" data-contact-collaboration></ul>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p data-footer-text></p>
      <p data-footer-copyright></p>
    </footer>
  </body>
</html>
