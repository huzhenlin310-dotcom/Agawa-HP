<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Blog page for a trilingual personal magazine website.">
    <title>Blog · 阿川</title>
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/main.js" defer></script>
  </head>
  <body data-page="blog">
    <div class="reading-progress" aria-hidden="true"><span></span></div>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Home">
        <span class="brand-mark">+1</span>
        <span class="brand-text">Lab</span>
      </a>
      <nav class="primary-nav" aria-label="Primary navigation">
        <a href="index.html" data-nav="home">HOME</a>
        <a href="about.html" data-nav="about">ABOUT</a>
        <a href="works.html" data-nav="works">WORKS</a>
        <a href="blog.html" data-nav="blog" aria-current="page">BLOG</a>
        <a href="contact.html" data-nav="contact">CONTACT</a>
      </nav>
      <div class="language-switch" aria-label="Language">
        <button type="button" data-lang="zh" aria-pressed="true">中</button>
        <button type="button" data-lang="en" aria-pressed="false">EN</button>
        <button type="button" data-lang="ja" aria-pressed="false">日</button>
      </div>
    </header>

    <main id="content" class="page-shell blog-page">
      <section class="blog-intro reveal">
        <p class="issue-label" data-ui="blogKicker">Web Journal</p>
        <h1 class="page-title" data-blog-title>Blog</h1>
        <p class="page-lead" data-blog-lead></p>
      </section>

      <section class="blog-topics reveal" aria-labelledby="blog-topics-title">
        <div class="section-rule"></div>
        <p class="section-kicker" data-ui="blogTopics">Topics</p>
        <h2 id="blog-topics-title" class="section-title">写作方向</h2>
        <ul class="topic-list" data-blog-topics></ul>
      </section>

      <section class="blog-index reveal" aria-labelledby="blog-index-title">
        <div class="section-rule"></div>
        <p class="section-kicker" data-ui="blogIndex">Web articles</p>
        <h2 id="blog-index-title" class="section-title" data-blog-index-title>記事索引</h2>
        <div class="blog-list" data-blog-list></div>
      </section>
    </main>

    <footer class="site-footer">
      <p data-footer-text></p>
      <p data-footer-copyright></p>
    </footer>
  </body>
</html>
